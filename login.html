<!-- login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Tizian AI</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#07070f;--card:#10101e;--border:#1e1e35;--gold:#f0b429;--gold2:#ffd166;--blue:#4f8ef7;--text:#e8e8f5;--muted:#8888aa;--dim:#3a3a55;--green:#25d366}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column}
.auth-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem;position:relative;overflow:hidden}
.auth-glow{position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 0%,rgba(79,142,247,.1),transparent 60%);pointer-events:none}
.auth-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:2.5rem;width:100%;max-width:420px;position:relative;z-index:1}
.auth-logo{font-family:'Outfit',sans-serif;font-weight:800;font-size:1.5rem;background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;margin-bottom:.5rem;display:block;text-decoration:none}
.auth-card h1{font-family:'Outfit',sans-serif;font-weight:800;font-size:1.8rem;text-align:center;margin-bottom:.4rem;letter-spacing:-.02em}
.auth-card .subtitle{text-align:center;color:var(--muted);font-size:.875rem;margin-bottom:2rem}
.form-group{margin-bottom:1rem}
.form-group label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:.4rem;letter-spacing:.03em}
.input-wrap{position:relative}
.input-wrap i{position:absolute;left:.9rem;top:50%;transform:translateY(-50%);color:var(--dim);font-size:.85rem}
.form-group input{width:100%;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;padding:.8rem 1rem .8rem 2.5rem;color:var(--text);font-family:'Inter',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s}
.form-group input:focus{border-color:var(--gold)}
.form-group input::placeholder{color:var(--dim)}
.btn-auth{width:100%;padding:.9rem;background:linear-gradient(135deg,var(--gold),#e09800);border:none;border-radius:10px;font-weight:700;font-size:.95rem;color:#07070f;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .25s;margin-top:.5rem}
.btn-auth:hover{box-shadow:0 6px 25px rgba(240,180,41,.4);transform:translateY(-1px)}
.auth-switch{text-align:center;margin-top:1.5rem;font-size:.85rem;color:var(--muted)}
.auth-switch a{color:var(--gold);font-weight:600}
.error-msg{background:rgba(240,84,84,.1);border:1px solid rgba(240,84,84,.3);border-radius:8px;padding:.7rem 1rem;font-size:.82rem;color:#f05454;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
.divider{display:flex;align-items:center;gap:1rem;margin:1.2rem 0;color:var(--dim);font-size:.78rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.btn-wa{width:100%;padding:.85rem;background:var(--green);border:none;border-radius:10px;font-weight:700;font-size:.9rem;color:#fff;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .25s;display:flex;align-items:center;justify-content:center;gap:.6rem;text-decoration:none}
.btn-wa:hover{background:#1ebe57}
nav-top{display:block;padding:1.2rem 2rem;border-bottom:1px solid var(--border)}
.nav-t{display:flex;justify-content:space-between;align-items:center;padding:1.2rem 5%;border-bottom:1px solid var(--border)}
.nav-t a{font-size:.85rem;color:var(--muted);transition:color .2s}
.nav-t a:hover{color:var(--gold)}
</style>
</head>
<body>
<div class="nav-t">
  <a href="/" style="font-family:'Outfit',sans-serif;font-weight:800;font-size:1.2rem;background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">TIZIAN AI</a>
  <a href="/signup">Don't have an account? <strong style="color:var(--gold)">Sign Up</strong></a>
</div>
<div class="auth-wrap">
  <div class="auth-glow"></div>
  <div class="auth-card">
    <span class="auth-logo">TIZIAN AI</span>
    <h1>Welcome Back</h1>
    <p class="subtitle">Sign in to your AI Business Assistant</p>

    {% if error %}
    <div class="error-msg"><i class="fas fa-exclamation-circle"></i> {{ error }}</div>
    {% endif %}

    <form method="POST">
      <div class="form-group">
        <label>Email Address</label>
        <div class="input-wrap">
          <i class="fas fa-envelope"></i>
          <input type="email" name="email" placeholder="your@email.com" required autocomplete="email">
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <i class="fas fa-lock"></i>
          <input type="password" name="password" placeholder="Your password" required autocomplete="current-password">
        </div>
      </div>
      <button type="submit" class="btn-auth"><i class="fas fa-sign-in-alt"></i> Sign In</button>
    </form>

    <div class="divider">or</div>
    <a href="https://wa.me/254742251656?text=Hi!%20I%20need%20help%20accessing%20my%20Tizian%20AI%20account." target="_blank" class="btn-wa">
      <i class="fab fa-whatsapp"></i> Need Help? Contact Support
    </a>

    <p class="auth-switch">New here? <a href="/signup">Create a free account →</a></p>
  </div>
</div>
</body>
</html>
